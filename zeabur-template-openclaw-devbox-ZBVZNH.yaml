        description: 您的 OpenClaw 實例在 Zeabur 上的服務名稱，作為內部主機名使用（例如 "openclaw"）
    readme: |
      # OpenClaw devbox 🦞

      OpenClaw 的遠端執行節點，預裝多種程式語言與開發工具。

      ## 預裝語言與工具
      - **Python 3**（python3、pip、venv）
      - **Node.js**（來自 OpenClaw 基礎映像檔）
      - **Go**（golang）
      - **Rust**（rustc、cargo）
      - **C/C++**（gcc、g++、make、cmake）
      - **開發工具**：git、curl、wget、jq、unzip、zip

      ## 持久化使用者套件
      使用者安裝的套件在容器重啟後仍會保留：
      - `pip install` → `~/.local/`
      - `npm install -g` → `~/.npm-global/`
      - `go install` → `~/go/`
      - `cargo install` → `~/.cargo/`

      ## 使用案例
      - **多語言程式執行** — 在對話中請 AI 撰寫並執行 Python、Go、Rust、C 程式碼
      - **套件安裝與測試** — 請 AI 安裝第三方套件並驗證功能（安裝會持久化，重啟後仍保留）
      - **資料處理與分析** — 上傳資料檔，請 AI 用 Python 或 jq 處理、轉換、分析
      - **Git 操作與專案建置** — Clone 儲存庫、建置專案、執行測試
      - **系統自動化腳本** — 撰寫和測試 shell script 與自動化工具

      ## 設定步驟
      1. 部署前，先從 OpenClaw 服務的**使用說明**分頁中複製 **Gateway Token**，方便後續輸入
      2. 將此模板部署到與您的 OpenClaw 實例**相同的 Zeabur 專案**
      3. 輸入 **Gateway Token** 和 **Gateway Host**（您的 OpenClaw 實例的 Zeabur 服務名稱，例如服務名稱為 `openclaw`，則填入 `openclaw`）
      4. devbox 節點將連線至 OpenClaw 並發送配對請求
      5. 在您的 OpenClaw 服務終端中批准配對請求：
         ```
         openclaw devices list       # 找到待處理的請求 ID
         openclaw devices approve <requestId>
         ```

      ## 建議資源配置
      - **CPU**：2 vCPU
      - **記憶體**：2048 MB

      ## 驗證
      部署後，確認 devbox 節點已出現在 OpenClaw 中：
      - 在 OpenClaw 服務終端中執行 `openclaw nodes list`
      - 或在 OpenClaw Web UI 的節點頁面中查看
      - 或直接在對話中詢問：「你現在有看到 devbox 的 node 嗎？」

      ## 架構
      - 無對外公開端口 — devbox 透過 WebSocket 主動連線至 OpenClaw gateway
      - `exec.security` 設為 `full` — 執行指令時無需互動式批准
      - 系統執行環境內建於映像檔中；使用者套件儲存在持久化磁碟上

      ## 疑難排解
      - 如果已輸入 **Gateway Host** 但在 `openclaw devices list` 中看不到等待配對的請求，可能是服務名稱填寫錯誤。請前往 Zeabur 控制台中 OpenClaw 服務的**網路**分頁，查看內網名稱。例如內網名稱為 `openclaw.zeabur.internal`，則 Gateway Host 應填入 `openclaw`（`.zeabur.internal` 前面的部分）。
      - 如果 devbox 服務長時間未成功配對，Zeabur 可能會自動暫停該服務。請在嘗試配對前確認 devbox 服務處於**執行中**狀態。

