# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
    name: OpenClaw devbox 🦞
spec:
    description: |
      OpenClaw devbox is a remote execution node for OpenClaw with programming languages and dev tools pre-installed (Python, Go, Rust, gcc, git, jq). User-installed packages persist across restarts via a persistent volume.
    icon: https://raw.githubusercontent.com/openclaw/openclaw/main/docs/assets/pixel-lobster.svg
    coverImage: https://raw.githubusercontent.com/openclaw/openclaw/main/docs/assets/openclaw-logo-text.png
    variables:
      - key: GATEWAY_TOKEN
        type: STRING
        name: Gateway Token
        description: The gateway authentication token of your OpenClaw instance
      - key: GATEWAY_HOST
        type: STRING
        name: Gateway Host
        description: The Zeabur service name of your OpenClaw instance (used as internal hostname, e.g. "openclaw")
    tags:
      - AI
      - DevTools

    readme: |
      # OpenClaw devbox 🦞

      A remote execution node for OpenClaw with programming languages and dev tools pre-installed.

      ## Pre-installed Languages & Tools
      - **Python 3** (python3, pip, venv)
      - **Node.js** (from OpenClaw base image)
      - **Go** (golang)
      - **Rust** (rustc, cargo)
      - **C/C++** (gcc, g++, make, cmake)
      - **Dev tools**: git, curl, wget, jq, unzip, zip

      ## Persistent User Packages
      User-installed packages persist across container restarts:
      - `pip install` → `~/.local/`
      - `npm install -g` → `~/.npm-global/`
      - `go install` → `~/go/`
      - `cargo install` → `~/.cargo/`

      ## Use Cases
      - **Multi-language code execution** — Ask the AI to write and run Python, Go, Rust, or C code in the conversation
      - **Package installation & testing** — Ask the AI to install third-party packages and verify functionality (installations persist across restarts)
      - **Data processing & analysis** — Upload data files and have the AI process, transform, or analyze them with Python or jq
      - **Git operations & project builds** — Clone repositories, build projects, and run tests
      - **System automation scripts** — Write and test shell scripts and automation tools

      ## Setup
      1. Copy the **Gateway Token** from your OpenClaw service's **Instructions** tab before deploying, so you can paste it easily during setup
      2. Deploy this template to the **same Zeabur project** as your OpenClaw instance
      3. Enter the **Gateway Token** and **Gateway Host** (the Zeabur service name of your OpenClaw instance, e.g. if the service is named `openclaw`, enter `openclaw`)
      4. The devbox node will connect to OpenClaw and send a pairing request
      5. Approve the pairing request in your OpenClaw service terminal:
         ```
         openclaw devices list       # find the pending request ID
         openclaw devices approve <requestId>
         ```

      ## Recommended Resources
      - **CPU**: 2 vCPU
      - **Memory**: 2048 MB

      ## Verification
      After deployment, check that the devbox node appears in OpenClaw:
      - Run `openclaw nodes list` in your OpenClaw service terminal
      - Or check the Nodes page in the OpenClaw Web UI
      - Or simply ask in the conversation: "Can you see the devbox node?"

      ## Architecture
      - No exposed ports — the devbox initiates an outbound WebSocket connection to the OpenClaw gateway
      - `exec.security` is set to `full` — no interactive approval needed for command execution
      - System runtimes are baked into the image; user packages live on the persistent volume

      ## Troubleshooting
      - If you have entered the **Gateway Host** but don't see a pending pairing request in `openclaw devices list`, the service name might be incorrect. Go to the **Networking** tab of your OpenClaw service in the Zeabur dashboard and check the private hostname. For example, if the private hostname is `openclaw.zeabur.internal`, then the Gateway Host should be `openclaw` (the part before `.zeabur.internal`).
      - If the devbox service has not successfully paired for a long time, Zeabur may automatically suspend it. Make sure the devbox service is **running** before attempting to pair.

    services:
      - name: openclaw-devbox
        icon: https://raw.githubusercontent.com/openclaw/openclaw/main/docs/assets/pixel-lobster.svg
        template: PREBUILT_V2
        spec:
          source:
            image: ghcr.io/canyugs/openclaw-devbox:latest
            command:
              - /bin/sh
              - -c
              - /opt/openclaw-devbox/startup.sh
          volumes:
            - id: data
              dir: /home/node
          configs:
            - path: /opt/openclaw-devbox/startup.sh
              envsubst: false
              permission: 493
              template: |
                #!/bin/sh
                set -e

                CONFIG_DIR="$HOME/.openclaw"
                CONFIG_FILE="$CONFIG_DIR/openclaw.json"

                # Create config with full exec security (no approval needed for server-side container)
                if [ ! -f "$CONFIG_FILE" ]; then
                  mkdir -p "$CONFIG_DIR"
                  cat > "$CONFIG_FILE" << 'CONF'
                {
                  "tools": {
                    "exec": {
                      "security": "full"
                    }
                  }
                }
                CONF
                  chmod 600 "$CONFIG_FILE"
                fi

                # Ensure user-level directories exist on persistent volume
                mkdir -p "$HOME/.local/bin"

                # Create openclaw CLI wrapper
                cat > "$HOME/.local/bin/openclaw" << 'WRAPPER'
                #!/bin/sh
                exec node /app/dist/index.js "$@"
                WRAPPER
                chmod +x "$HOME/.local/bin/openclaw"
                mkdir -p "$HOME/.npm-global"
                mkdir -p "$HOME/go/bin"
                mkdir -p "$HOME/.cargo/bin"
                mkdir -p "$HOME/workspace"

                # Start node host — retry on pairing rejection to avoid container restart loop
                RETRY_DELAY=10
                while true; do
                  echo "Connecting to gateway ${GATEWAY_HOST:-openclaw}:${GATEWAY_PORT:-18789}..."
                  openclaw node run \
                    --host "${GATEWAY_HOST:-openclaw}" \
                    --port "${GATEWAY_PORT:-18789}" \
                    --display-name "${NODE_DISPLAY_NAME:-devbox}" && break
                  echo "Connection lost. Retrying in ${RETRY_DELAY}s..."
                  sleep "$RETRY_DELAY"
                done
          env:
            OPENCLAW_GATEWAY_TOKEN:
              default: ${GATEWAY_TOKEN}
            HOME:
              default: /home/node
            GATEWAY_HOST:
              default: ${GATEWAY_HOST}
            GATEWAY_PORT:
              default: "18789"
            NODE_DISPLAY_NAME:
              default: devbox
            NODE_ENV:
              default: production
            NODE_OPTIONS:
              default: --max-old-space-size=1024
            PIP_USER:
              default: "1"
            PYTHONUSERBASE:
              default: /home/node/.local
            NPM_CONFIG_PREFIX:
              default: /home/node/.npm-global
            GOPATH:
              default: /home/node/go
            RUSTUP_HOME:
              default: /home/node/.rustup
            CARGO_HOME:
              default: /home/node/.cargo
            PATH:
              default: /home/node/.local/bin:/home/node/.npm-global/bin:/home/node/go/bin:/home/node/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

